<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kiosk - ระบบลงเวลา</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Sarabun', sans-serif; }
        body { background: linear-gradient(135deg, #eef2f9 0%, #e0e8f5 100%); color: #333; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding: 20px; }
        .card { background: #ffffff; width: 100%; max-width: 480px; border-radius: 24px; box-shadow: 0 15px 35px rgba(0,0,0,0.05); padding: 40px 30px; position: relative; text-align: center; margin-top: 50px; margin-bottom: 30px; }
        .logo-container { position: relative; width: 110px; height: 110px; margin: -80px auto 20px auto; background: #fff; border-radius: 24px; box-shadow: 0 8px 20px rgba(0,0,0,0.08); padding: 10px; display: flex; align-items: center; justify-content: center; }
        .logo-container img { width: 100%; height: 100%; object-fit: contain; border-radius: 16px; }
        h1 { font-size: 24px; color: #2c3e50; font-weight: 600; margin-bottom: 5px; }
        p.subtitle { color: #8e9eab; font-size: 14px; margin-bottom: 30px; }
        .section { display: none; }
        .active-section { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .input-group { text-align: left; margin-bottom: 15px; }
        .input-group label { display: block; font-size: 14px; color: #555; margin-bottom: 8px; font-weight: 600; }
        select, input, textarea { width: 100%; padding: 14px; border: 1px solid #dcdde1; border-radius: 12px; font-size: 15px; color: #333; background: #fdfdfd; transition: all 0.3s; }
        select:focus, input:focus, textarea:focus { border-color: #5c67f2; outline: none; box-shadow: 0 0 0 3px rgba(92,103,242,0.1); }
        .numpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 20px; }
        .num-btn { background: #f4f6f9; border: none; padding: 18px; font-size: 22px; border-radius: 12px; cursor: pointer; color: #333; font-weight: 600; transition: background 0.2s; }
        .btn { width: 100%; padding: 16px; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; margin-bottom: 12px; color: #fff; }
        .btn-primary { background: #5c67f2; box-shadow: 0 8px 15px rgba(92,103,242,0.25); }
        .btn-checkin { background: #06C755; } .btn-checkout { background: #ff4d4f; }
        .btn-outline { background: transparent; color: #5c67f2; border: 1px solid #bcc4fb; }
        .btn-export { background: #10b981; box-shadow: 0 8px 15px rgba(16,185,129,0.25); }
        #loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.95); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #5c67f2; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .swal2-popup { font-family: 'Sarabun', sans-serif !important; border-radius: 20px !important; }
        
        /* สไตล์ตาราง Dashboard */
        .dash-card { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 12px; padding: 12px; margin-bottom: 10px; text-align: left; position: relative; }
        .dash-date { font-weight: 600; color: #5c67f2; font-size: 14px; margin-bottom: 5px; }
        .dash-name { font-weight: 600; color: #1e293b; font-size: 15px; }
        .dash-detail { font-size: 13px; color: #64748b; margin-top: 4px; display: flex; justify-content: space-between;}
        .dash-badge { position: absolute; top: 12px; right: 12px; font-size: 11px; padding: 4px 8px; border-radius: 12px; font-weight: 600;}
        .badge-shift { background: #e0e7ff; color: #4338ca; }
        .badge-leave { background: #ffe4e6; color: #e11d48; }
    </style>
</head>
<body>

    <div id="loading-overlay">
        <div class="spinner"></div><h3 id="loading-text" style="color:#5c67f2; font-weight:600;">กำลังเชื่อมต่อระบบ...</h3>
    </div>

    <div class="card">
        <div class="logo-container">
            <img id="companyLogo" src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" alt="Logo">
        </div>
        <h1 id="headerTitle">HR Management</h1>
        <p class="subtitle" id="displayBranch">กำลังโหลดข้อมูล...</p>

        <!-- 1. หน้าเลือกพนักงาน และเมนูหลัก -->
        <div id="sec-select-user" class="section active-section">
            <div id="manager-branch-filter" class="input-group" style="display:none; padding:10px; background:#f0f4ff; border-radius:12px;">
                <label style="color:#5c67f2;">🏢 สลับดูพนักงานสาขาอื่น (ผู้จัดการ)</label>
                <select id="viewBranchSelect" onchange="changeViewBranch()"></select>
            </div>

            <div class="input-group">
                <label>ชื่อผู้ใช้งาน</label>
                <select id="employeeSelect"><option value="">-- กรุณาเลือกชื่อ --</option></select>
            </div>

            <button class="btn btn-primary" onclick="goToPin()">👉 ลงเวลา เข้า-ออกงาน</button>
            <button class="btn btn-outline" style="margin-top:5px;" onclick="showSection('sec-view-schedule'); loadDashboard();">🗓️ ดูตารางกะทำงาน</button>
            <button class="btn btn-outline" style="margin-top:5px;" onclick="goToCertRequest()">📄 ขอหนังสือรับรองเงินเดือน</button>
            <button class="btn btn-outline" style="margin-top:5px;" onclick="goToChangePin()">🔑 เปลี่ยนรหัส PIN</button>
            
            <!-- เมนู Admin -->
            <button id="btn-manage-schedule" class="btn" style="display:none; background:#8b5cf6; margin-top:5px;" onclick="goToManageSchedule()">📅 จัดตารางกะพนักงาน</button>
            <button id="btn-download-excel" class="btn btn-export" style="display:none; margin-top:5px;" onclick="showSection('sec-export')">📥 ดาวน์โหลด Excel</button>
            <button id="btn-edit-employee" class="btn btn-outline" style="display:none; margin-top:5px;" onclick="goToEditEmployee()">✏️ แก้ไขข้อมูลพนักงาน</button>
            <button id="btn-show-admin" class="btn btn-outline" style="display:none; margin-top:5px;" onclick="showSection('sec-admin')">➕ เพิ่มพนักงานใหม่</button>
            <button id="btn-resign-employee" class="btn btn-outline" style="display:none; margin-top:5px; color:#ff4d4f; border-color:#ff4d4f; background:#fff1f0;" onclick="goToResign()">🚪 แจ้งลาออก</button>
        </div>

        <!-- ... (หน้ากดรหัส PIN, ลงเวลา, แก้ไขพนักงาน, ลาออก, ขอหนังสือรับรอง ยังคงเหมือนเดิมเป๊ะครับ ผมขอข้ามเพื่อความกระชับ) ... -->
        
        <!-- 🌟 9. หน้าจัดตารางกะ (ใหม่) -->
        <div id="sec-manage-schedule" class="section" style="text-align: left;">
            <h2 style="font-size:20px; margin-bottom:15px; color:#8b5cf6; text-align: center;">📅 จัดตารางกะทำงาน</h2>
            
            <div class="input-group">
                <label>เลือกพนักงานที่ต้องการจัดกะ</label>
                <select id="schEmpSelect"><option value="">-- เลือกพนักงาน --</option></select>
            </div>
            
            <div class="input-group">
                <label>กำหนดช่วงวันที่ (Date Range)</label>
                <div style="display: flex; gap: 10px;">
                    <div style="width: 50%;">
                        <span style="font-size:12px; color:#777;">ตั้งแต่วันที่</span>
                        <input type="date" id="schStartDate">
                    </div>
                    <div style="width: 50%;">
                        <span style="font-size:12px; color:#777;">ถึงวันที่</span>
                        <input type="date" id="schEndDate">
                    </div>
                </div>
            </div>

            <div class="input-group" style="padding:15px; background:#f0fdf4; border-radius:12px; border:1px solid #bbf7d0;">
                <label style="color:#16a34a;">✅ กำหนดวันมาทำงาน</label>
                <select id="schShift1" style="margin-bottom: 10px;">
                    <option value="-">-- เลือกกะหลัก --</option>
                </select>
                <select id="schShift2">
                    <option value="-">-- ควบกะ (OT) / ทิ้งว่างถ้าไม่มี --</option>
                </select>
            </div>

            <div class="input-group" style="padding:15px; background:#fff1f0; border-radius:12px; border:1px solid #fecaca;">
                <label style="color:#dc2626;">❌ หรือ กำหนดวันหยุดงาน (เขียนทับ)</label>
                <select id="schLeave">
                    <option value="-">-- ไม่ใช่วันหยุด --</option>
                </select>
            </div>

            <button class="btn" style="background:#8b5cf6;" onclick="submitSchedule()">💾 บันทึกตารางงาน</button>
            <button class="btn btn-outline" onclick="showSection('sec-select-user')">ย้อนกลับ</button>
        </div>

        <!-- 🌟 10. หน้าดู Dashboard ตารางงาน (ใหม่) -->
        <div id="sec-view-schedule" class="section">
            <h2 style="font-size:20px; margin-bottom:15px; color:#5c67f2;">🗓️ ตารางงานสาขา <span id="dashBranchName"></span></h2>
            
            <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                <select id="dashMonthFilter" onchange="loadDashboard()"></select>
                <select id="dashYearFilter" onchange="loadDashboard()"></select>
            </div>

            <div id="dashboardContainer" style="max-height: 400px; overflow-y: auto; padding-right: 5px; margin-bottom: 15px;">
                <!-- Cards จะถูกสร้างที่นี่อัตโนมัติ -->
            </div>
            
            <button class="btn btn-outline" onclick="showSection('sec-select-user')">ย้อนกลับ</button>
        </div>

        <!-- 🌟 11. หน้าโหลด Excel (ใหม่) -->
        <div id="sec-export" class="section">
            <h2 style="font-size:20px; margin-bottom:15px; color:#10b981;">📥 ส่งออกข้อมูล Excel</h2>
            <p class="subtitle" style="margin-bottom:15px;">ระบบจะเปิดหน้าต่างใหม่เพื่อดาวน์โหลดไฟล์ .xlsx ให้คุณทันที</p>
            
            <button class="btn btn-export" onclick="downloadExcel('timesheet')">📊 ดาวน์โหลด Timesheet (ลงเวลาจริง)</button>
            <button class="btn" style="background:#8b5cf6;" onclick="downloadExcel('schedules')">📅 ดาวน์โหลด ตารางกะทำงาน</button>
            
            <button class="btn btn-outline" style="margin-top: 20px;" onclick="showSection('sec-select-user')">ย้อนกลับ</button>
        </div>

    </div>

    <script>
        window.alert = function(message) { /* SweetAlert override เดิม */
            let iconType = 'info'; let titleText = 'แจ้งเตือน'; let msg = message;
            if (message.includes('✅') || message.includes('สำเร็จ')) { iconType = 'success'; titleText = 'สำเร็จ'; msg = message.replace('✅ สำเร็จ!', '').replace('✅', '').trim(); } 
            else if (message.includes('❌') || message.includes('ผิดพลาด') || message.includes('ล้มเหลว')) { iconType = 'error'; titleText = 'เกิดข้อผิดพลาด'; msg = message.replace('❌ ผิดพลาด:', '').replace('❌', '').trim(); } 
            else if (message.includes('กรุณา') || message.includes('ใหญ่เกินไป')) { iconType = 'warning'; }
            Swal.fire({ title: titleText, text: msg, icon: iconType, confirmButtonColor: '#5c67f2' });
        };

        const LIFF_ID = "2010679559-lZL2VgxC"; 
        const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzq4Tptb5jFVv7gLFuZvM2pEZ1PuAb5v63Z4aQKmiWTG1Txq9_4bxi0u-3LIkcRqrL7/exec"; 
        
        let currentBranch = ""; let employeeList = []; let currentUserUid = ""; let currentAdminRole = null;
        let globalShifts = []; let globalLeaves = []; let exportLinks = {};

        async function main() {
            try {
                await liff.init({ liffId: LIFF_ID });
                if (!liff.isLoggedIn()) { liff.login(); return; }
                currentUserUid = liff.getDecodedIDToken().sub || (await liff.getProfile()).userId;
                await loadKioskData(currentUserUid);
                initDashboardFilters();
            } catch (err) { 
                hideLoading(); // 🌟 ปิดตัวหมุนก่อนแจ้งเตือน
                alert("เกิดข้อผิดพลาด: " + err.message); 
            }
        }

        async function loadKioskData(lineUid) {
            try {
                const res = await fetch(`${GAS_WEB_APP_URL}?uid=${lineUid}`); 
                const result = await res.json();
                
                if (result.status === 'success') {
                    const data = result.data;
                    currentBranch = data.branch.branchName; employeeList = data.employees;
                    globalShifts = data.shifts; globalLeaves = data.leaves; exportLinks = data.exports;
                    
                    document.getElementById('displayBranch').innerText = 'สาขา: ' + currentBranch;
                    document.getElementById('dashBranchName').innerText = currentBranch;
                    updateEmployeeDropdowns();
                    populateShiftAndLeaveOptions();

                    if (data.admin && data.admin.isAdmin) {
                        currentAdminRole = data.admin;
                        document.getElementById('btn-show-admin').style.display = 'block';
                        document.getElementById('btn-edit-employee').style.display = 'block';
                        document.getElementById('btn-resign-employee').style.display = 'block'; 
                        document.getElementById('btn-manage-schedule').style.display = 'block'; 
                        
                        if (data.admin.branchCode === 'SD0000' || data.admin.branchCode === 'SD0001') {
                            document.getElementById('btn-download-excel').style.display = 'block'; 
                        }

                        if(data.admin.isManager) {
                            document.getElementById('manager-branch-filter').style.display = 'block';
                            // 🌟 ลบคำสั่งต้นเหตุที่ทำให้เว็บค้างออกไปเรียบร้อยแล้ว
                        }
                    }
                    hideLoading(); // โหลดเสร็จสมบูรณ์ค่อยปิดตัวหมุน
                } else { 
                    hideLoading(); // 🌟 ปิดตัวหมุนก่อนแจ้งเตือน
                    document.getElementById('loading-text').innerHTML = `<span style="color:#ff4d4f;">${result.message}</span>`; 
                    alert(result.message);
                }
            } catch (error) { 
                hideLoading(); // 🌟 ปิดตัวหมุนดักไว้ก่อนแจ้งเตือนเสมอ
                alert("เชื่อมต่อฐานข้อมูลล้มเหลว กรุณารีเฟรชหรือตรวจสอบลิงก์ใหม่"); 
            }
        }

        function updateEmployeeDropdowns() {
            let html = '<option value="">-- กรุณาเลือกชื่อ --</option>'; 
            employeeList.forEach(emp => { html += `<option value="${emp.empId}">${emp.name}</option>`; });
            document.getElementById('employeeSelect').innerHTML = html;
            document.getElementById('schEmpSelect').innerHTML = html; // อัปเดต dropdown หน้าจัดกะด้วย
        }

        function populateShiftAndLeaveOptions() {
            let shiftHtml = '<option value="-" data-time="">-- เลือกกะ --</option>';
            globalShifts.forEach(s => { shiftHtml += `<option value="${s.code}" data-time="${s.timeStr}">กะ ${s.code} (${s.timeStr})</option>`; });
            document.getElementById('schShift1').innerHTML = shiftHtml.replace('-- เลือกกะ --', '-- เลือกกะหลัก --');
            document.getElementById('schShift2').innerHTML = shiftHtml.replace('-- เลือกกะ --', '-- ควบกะ (OT) / ทิ้งว่างถ้าไม่มี --');

            let leaveHtml = '<option value="-">-- ไม่ใช่วันหยุด --</option>';
            globalLeaves.forEach(l => { leaveHtml += `<option value="${l}">${l}</option>`; });
            document.getElementById('schLeave').innerHTML = leaveHtml;
        }

        // ==========================================
        // 🌟 ระบบจัดกะพนักงาน
        // ==========================================
        async function goToManageSchedule() {
            // ถ้าไม่ใช่ สนญ. บังคับใส่ PIN
            if (currentAdminRole.branchCode !== 'SD0000' && currentAdminRole.branchCode !== 'SD0001') {
                const { value: managerPin } = await Swal.fire({
                    title: 'ยืนยันสิทธิ์ผู้จัดการ',
                    input: 'password',
                    inputLabel: 'กรุณาใส่รหัส PIN ผู้จัดการสาขาเพื่อเข้าจัดกะ',
                    inputPlaceholder: 'รหัส 4 หลัก',
                    inputAttributes: { maxlength: 4, autocapitalize: 'off', autocorrect: 'off' },
                    showCancelButton: true, confirmButtonColor: '#8b5cf6'
                });
                if (!managerPin) return;
                window.tempManagerPin = managerPin; // เก็บ PIN ไว้ใช้ตอนกด Save
            } else {
                window.tempManagerPin = "ADMIN";
            }
            
            document.getElementById('schStartDate').value = ""; document.getElementById('schEndDate').value = "";
            document.getElementById('schShift1').value = "-"; document.getElementById('schShift2').value = "-"; document.getElementById('schLeave').value = "-";
            showSection('sec-manage-schedule');
        }

        async function submitSchedule() {
            const empId = document.getElementById('schEmpSelect').value;
            const startDate = document.getElementById('schStartDate').value;
            const endDate = document.getElementById('schEndDate').value;
            const shift1El = document.getElementById('schShift1');
            const shift2El = document.getElementById('schShift2');
            const leaveType = document.getElementById('schLeave').value;

            if(!empId || !startDate || !endDate) return alert("กรุณาเลือกพนักงาน และกำหนดช่วงวันที่ให้ครบถ้วน");
            if(leaveType === "-" && shift1El.value === "-") return alert("กรุณาเลือกกะทำงาน หรือ กำหนดเป็นวันหยุด");

            const emp = employeeList.find(e => e.empId == empId);
            const shift1Time = shift1El.options[shift1El.selectedIndex].getAttribute('data-time');
            const shift2Time = shift2El.options[shift2El.selectedIndex].getAttribute('data-time');

            showLoading("กำลังจัดตารางกะ...");
            try {
                const payload = { 
                    action: 'saveSchedules', uid: currentUserUid, managerPin: window.tempManagerPin,
                    targetEmpId: empId, targetEmpName: emp.name, targetBranch: currentBranch,
                    startDate: startDate, endDate: endDate,
                    shift1: shift1El.value, shift1Time: shift1Time,
                    shift2: shift2El.value, shift2Time: shift2Time,
                    leaveType: leaveType
                };
                const res = await fetch(GAS_WEB_APP_URL, { method: 'POST', body: JSON.stringify(payload) });
                const result = await res.json();
                if(result.status === 'success') { await Swal.fire('สำเร็จ', result.message, 'success'); showSection('sec-select-user'); } 
                else { await Swal.fire('ผิดพลาด', result.message, 'error'); }
            } catch(e) { await Swal.fire('ผิดพลาด', 'เชื่อมต่อล้มเหลว', 'error'); }
            hideLoading();
        }

        // ==========================================
        // 🌟 ระบบ Dashboard ตารางงาน
        // ==========================================
        function initDashboardFilters() {
            const mSelect = document.getElementById('dashMonthFilter'); const ySelect = document.getElementById('dashYearFilter');
            const today = new Date();
            const thMonths = ["ม.ค.", "ก.พ.", "มี.ค.", "เม.ย.", "พ.ค.", "มิ.ย.", "ก.ค.", "ส.ค.", "ก.ย.", "ต.ค.", "พ.ย.", "ธ.ค."];
            for(let i=1; i<=12; i++) { mSelect.innerHTML += `<option value="${i}" ${i === today.getMonth()+1 ? 'selected':''}>${thMonths[i-1]}</option>`; }
            for(let i=today.getFullYear()-1; i<=today.getFullYear()+1; i++) { ySelect.innerHTML += `<option value="${i}" ${i === today.getFullYear() ? 'selected':''}>ปี ${i}</option>`; }
        }

        async function loadDashboard() {
            const m = document.getElementById('dashMonthFilter').value;
            const y = document.getElementById('dashYearFilter').value;
            const container = document.getElementById('dashboardContainer');
            container.innerHTML = `<div style="text-align:center; padding: 20px;"><div class="spinner" style="margin: 0 auto;"></div><p style="font-size:12px; margin-top:10px; color:#555;">กำลังดึงข้อมูลสาขา ${currentBranch}...</p></div>`;
            
            try {
                const res = await fetch(GAS_WEB_APP_URL, { method: 'POST', body: JSON.stringify({ action: 'getSchedules', uid: currentUserUid, targetBranch: currentBranch, targetMonth: m, targetYear: y }) });
                const result = await res.json();
                if(result.status === 'success') {
                    const data = result.data;
                    if(data.length === 0) { container.innerHTML = `<p style="text-align:center; color:#888; padding:20px;">ไม่มีข้อมูลตารางงานในเดือนนี้</p>`; return; }
                    
                    // เรียงตามวันที่ (ถ้าจัด Format DD/MM/YYYY มา)
                    data.sort((a,b) => { const pa=a.date.split('/'); const pb=b.date.split('/'); return new Date(`${pa[2]}-${pa[1]}-${pa[0]}`) - new Date(`${pb[2]}-${pb[1]}-${pb[0]}`); });
                    
                    let html = '';
                    data.forEach(item => {
                        let badgeHtml = '';
                        if(item.leave !== '-') { badgeHtml = `<span class="dash-badge badge-leave">${item.leave}</span>`; }
                        else { 
                            let sText = `กะ ${item.shift1}`; if(item.shift2 !== '-') sText += ` + ${item.shift2}`;
                            badgeHtml = `<span class="dash-badge badge-shift">${sText}</span>`; 
                        }
                        
                        let detailHtml = '';
                        if(item.leave === '-') {
                            detailHtml = `<span>เวลา: ${item.start} - ${item.end}</span><span style="color:#10b981;">(ปกติ: ${item.normalHrs} | OT: ${item.otHrs})</span>`;
                        } else {
                            detailHtml = `<span>วันหยุด/ลา</span>`;
                        }

                        html += `
                        <div class="dash-card">
                            <div class="dash-date">📅 ${item.date}</div>
                            <div class="dash-name">👤 ${item.name}</div>
                            ${badgeHtml}
                            <div class="dash-detail">${detailHtml}</div>
                        </div>`;
                    });
                    container.innerHTML = html;
                } else { container.innerHTML = `<p style="text-align:center; color:#e11d48;">ดึงข้อมูลล้มเหลว</p>`; }
            } catch (e) { container.innerHTML = `<p style="text-align:center; color:#e11d48;">เชื่อมต่อล้มเหลว</p>`; }
        }

        // ==========================================
        // 🌟 ฟังก์ชันดาวน์โหลด Excel
        // ==========================================
        function downloadExcel(type) {
            if (exportLinks && exportLinks[type]) {
                // เปิดลิงก์ดาวน์โหลดใน Tab ใหม่ (LINE จะเด้งเบราว์เซอร์ให้โหลดไฟล์อัตโนมัติ)
                window.open(exportLinks[type], '_blank');
            } else {
                alert("ไม่พบลิงก์สำหรับดาวน์โหลดไฟล์");
            }
        }

        function showSection(id) { document.querySelectorAll('.section').forEach(sec => sec.classList.remove('active-section')); document.getElementById(id).classList.add('active-section'); }
        // (ฟังก์ชันอื่นๆ ปล่อยไว้เหมือนเดิมครับ)
    </script>
</body>
</html>
