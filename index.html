<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kiosk - HR Management Program</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Sarabun', sans-serif; }
        body { background: linear-gradient(135deg, #eef2f9 0%, #e0e8f5 100%); color: #333; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .card { background: #ffffff; width: 100%; max-width: 420px; border-radius: 24px; box-shadow: 0 15px 35px rgba(0,0,0,0.05); padding: 40px 30px; position: relative; text-align: center; margin-top: 50px; }
        .logo-container { position: relative; width: 110px; height: 110px; margin: -80px auto 20px auto; background: #fff; border-radius: 24px; box-shadow: 0 8px 20px rgba(0,0,0,0.08); padding: 10px; display: flex; align-items: center; justify-content: center; }
        .logo-container img { width: 100%; height: 100%; object-fit: contain; border-radius: 16px; }
        .edit-logo-btn { position: absolute; bottom: -10px; right: -10px; background: #5c67f2; color: white; border: none; border-radius: 50%; width: 32px; height: 32px; cursor: pointer; display: none; box-shadow: 0 4px 10px rgba(92,103,242,0.4); font-size: 14px; }
        h1 { font-size: 24px; color: #2c3e50; font-weight: 600; margin-bottom: 5px; }
        p.subtitle { color: #8e9eab; font-size: 14px; margin-bottom: 30px; }
        .section { display: none; }
        .active-section { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .input-group { text-align: left; margin-bottom: 15px; }
        .input-group label { display: block; font-size: 14px; color: #555; margin-bottom: 8px; font-weight: 600; }
        select, input { width: 100%; padding: 14px; border: 1px solid #dcdde1; border-radius: 12px; font-size: 15px; color: #333; background: #fdfdfd; transition: all 0.3s; }
        select:focus, input:focus { border-color: #5c67f2; outline: none; box-shadow: 0 0 0 3px rgba(92,103,242,0.1); }
        .numpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 20px; }
        .num-btn { background: #f4f6f9; border: none; padding: 18px; font-size: 22px; border-radius: 12px; cursor: pointer; color: #333; font-weight: 600; transition: background 0.2s; }
        .num-btn:active { background: #e2e6ea; }
        .btn-clear { background: #fff0f0; color: #ff4d4f; }
        .btn-ok { background: #f0f9ff; color: #5c67f2; }
        .btn { width: 100%; padding: 16px; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; margin-bottom: 12px; transition: transform 0.1s, box-shadow 0.2s; color: #fff; }
        .btn:active { transform: scale(0.98); }
        .btn-primary { background: #5c67f2; box-shadow: 0 8px 15px rgba(92,103,242,0.25); }
        .btn-checkin { background: #06C755; box-shadow: 0 8px 15px rgba(6,199,85,0.25); }
        .btn-checkout { background: #ff4d4f; box-shadow: 0 8px 15px rgba(255,77,79,0.25); }
        .btn-outline { background: transparent; color: #5c67f2; border: 1px solid #5c67f2; }
        .btn-admin { background: #f8f9fa; color: #555; border: 1px solid #ddd; font-size: 14px; margin-top: 5px; }
        #video-container, #id-camera-container { position: relative; width: 100%; border-radius: 16px; overflow: hidden; background: #000; margin-bottom: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        #camera-feed, #id-camera-feed { width: 100%; display: block; }
        #canvas, #id-canvas { display: none; }
        #loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.95); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #5c67f2; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .footer-text { margin-top: 30px; font-size: 12px; color: #a4b0be; }
        .ho-badge { font-size: 12px; background: #ffe4e6; color: #e11d48; padding: 4px 10px; border-radius: 20px; display: inline-block; margin-bottom: 10px; font-weight: 600; }
    </style>
</head>
<body>

    <div id="loading-overlay">
        <div class="spinner"></div>
        <h3 id="loading-text" style="color:#5c67f2; font-weight:600;">กำลังเชื่อมต่อระบบ...</h3>
    </div>

    <div class="card">

        <h1 id="headerTitle">HR Management</h1>

        <!-- 1. หน้าเลือกพนักงาน -->

                    <option value="SD4880|Big C เลียบคลองสาม">Big C เลียบคลองสาม</option>
                    <option value="SD5524|โรงพยาบาลสมุทรปราการ">โรงพยาบาลสมุทรปราการ</option>

        <!-- 2. หน้ากดรหัส PIN -->

            <h2 style="font-size:20px; margin-bottom:15px; color:#5c67f2; text-align: center;">✏️ แก้ไขข้อมูลพนักงาน</h2>
            
            <div class="input-group">
                <label>ชื่อ - นามสกุล</label>

                    <input type="text" id="editFirstName" placeholder="ชื่อ">

            <div class="input-group">

                <input type="number" id="editNationalId" placeholder="เลข 13 หลัก" maxlength="13" oninput="if(this.value.length > 13) this.value = this.value.slice(0,13);">
            </div>

            <!-- กล่องตั้งค่าสิทธิ์พิเศษสำหรับ สนญ. -->

                <span class="ho-badge">🔒 เฉพาะสำนักงานใหญ่</span>

                <div class="input-group" style="margin-bottom: 0;">

            <div class="input-group">
                <label>ชื่อ - นามสกุล</label>
                <div style="display: flex; gap: 10px;">
                    <input type="text" id="newFirstName" placeholder="ชื่อ">
                    <input type="text" id="newLastName" placeholder="นามสกุล">
                </div>
            </div>

            <div class="input-group">
                <label>เลขบัตรประจำตัวประชาชน</label>
                <input type="number" id="newNationalId" placeholder="เลข 13 หลัก" maxlength="13" oninput="if(this.value.length > 13) this.value = this.value.slice(0,13);">
            </div>

            <div class="input-group">
                <label>ตำแหน่ง (Role)</label>
                <select id="newRoleSelect">
                    <option value="">-- เลือกตำแหน่ง --</option>

            <div class="input-group">

            <div class="input-group" id="branchSelectGroup" style="display:none;">
                <label>สาขาที่สังกัด</label>

                    <option value="SD2138|ชุมชนหัวรอ">ชุมชนหัวรอ</option>
                    <option value="SD2282|ชุมชนบางใหญ่ซิตี้">ชุมชนบางใหญ่ซิตี้</option>
                    <option value="SD2606|ตลาดจัมโบ้">ตลาดจัมโบ้</option>
                    <option value="SD3292|หน้า รพ สมุทรปราการ">หน้า รพ สมุทรปราการ</option>
                    <option value="SD4880|Big C เลียบคลองสาม">Big C เลียบคลองสาม</option>
                    <option value="SD5524|โรงพยาบาลสมุทรปราการ">โรงพยาบาลสมุทรปราการ</option>
                    <option value="SD5540|ชุมชนบางใหญ่ซิตี้ ซอย 5">ชุมชนบางใหญ่ซิตี้ ซอย 5</option>
                    <option value="SD5643|ลาดพร้าว 101">ลาดพร้าว 101</option>
                    <option value="SD5710|ถนน ประชาชาราษฎร์">ถนน ประชาชาราษฎร์</option>

            </div>

            <div class="input-group" style="text-align: center;">
                <label style="text-align: left;">รูปถ่ายบัตรประชาชน</label>
                <div id="id-camera-container" style="display: none;">
                    <video id="id-camera-feed" autoplay playsinline></video>
                    <canvas id="id-canvas"></canvas>
                </div>

            <button class="btn btn-primary" style="margin-top: 10px;" onclick="submitNewEmployee()">💾 บันทึกข้อมูลพนักงาน</button>
            <button class="btn btn-outline" onclick="showSection('sec-select-user'); stopIdCamera();">ย้อนกลับ</button>
        </div>
    </div>
    <div class="footer-text">© 2026 Kiosk - ระบบจัดการพนักงานสาขา</div>

    <script>
        const LIFF_ID = "2010679559-lZL2VgxC"; 
        const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzq4Tptb5jFVv7gLFuZvM2pEZ1PuAb5v63Z4aQKmiWTG1Txq9_4bxi0u-3LIkcRqrL7/exec"; 
        
        let currentBranch = ""; let employeeList = []; let selectedEmpId = ""; let pinCode = "";
        let videoStream = null; let currentAdminRole = null; let currentUserUid = ""; 
        let idVideoStream = null; let idCardBase64 = "";

        async function main() {
            try {
                await liff.init({ liffId: LIFF_ID });
                if (!liff.isLoggedIn()) { liff.login(); return; }
                const profile = await liff.getProfile();
                currentUserUid = profile.userId;
                await loadKioskData(profile.userId);
            } catch (err) { alert("เกิดข้อผิดพลาด: " + err.message); hideLoading(); }
        }
        main();

        async function loadKioskData(lineUid) {
            try {
                const res = await fetch(`${GAS_WEB_APP_URL}?uid=${lineUid}`);
                const result = await res.json();
                if (result.status === 'success') {
                    const data = result.data;
                    currentBranch = data.branch.branchName;
                    employeeList = data.employees;
                    document.getElementById('displayBranch').innerText = 'สาขา: ' + currentBranch;
                    document.getElementById('companyLogo').src = data.logo; 
                    updateEmployeeDropdown();

                    if (data.admin && data.admin.isAdmin) {
                        currentAdminRole = data.admin;
                        document.getElementById('btn-show-admin').style.display = 'block';
                        document.getElementById('btn-edit-employee').style.display = 'block';
                        
                        if(data.admin.isManager) {
                            document.getElementById('branchSelectGroup').style.display = 'block';
                            document.getElementById('manager-branch-filter').style.display = 'block';
                        }
                        if(data.admin.branchCode === 'SD0000') {
                            document.getElementById('btnEditLogo').style.display = 'block';
                        }
                    }
                    hideLoading();
                } else { document.getElementById('loading-text').innerHTML = `<span style="color:#ff4d4f;">${result.message}</span>`; }
            } catch (error) { alert("เชื่อมต่อฐานข้อมูลล้มเหลว"); }
        }

        function updateEmployeeDropdown() {
            const select = document.getElementById('employeeSelect');
            select.innerHTML = '<option value="">-- กรุณาเลือกชื่อ --</option>'; 
            employeeList.forEach(emp => {
                let opt = document.createElement('option');
                opt.value = emp.empId; opt.innerHTML = `${emp.name}`; select.appendChild(opt);
            });
        }

        // ==========================================
        // ระบบสลับสาขา (สำหรับ Manager / สนญ)
        // ==========================================
        async function changeViewBranch() {
            const sel = document.getElementById('viewBranchSelect').value;
            if(!sel) return;
            const branchName = sel.split("|")[1];

            showLoading("กำลังสลับข้อมูลสาขา...");
            try {
                const res = await fetch(GAS_WEB_APP_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'getEmployeesByBranch', uid: currentUserUid, branchName: branchName })
                });
                const result = await res.json();
                if (result.status === 'success') {
                    employeeList = result.data;
                    currentBranch = branchName;
                    document.getElementById('displayBranch').innerText = 'สาขา: ' + currentBranch;
                    updateEmployeeDropdown();
                }
            } catch (e) { alert("ล้มเหลว"); }
            hideLoading();
        }

        // ==========================================
        // ระบบแก้ไขข้อมูลพนักงาน
        // ==========================================
        function goToEditEmployee() {
            selectedEmpId = document.getElementById('employeeSelect').value;
            if (!selectedEmpId) return alert("กรุณาเลือกรายชื่อพนักงานที่ต้องการแก้ไขด้านบนก่อนครับ");

            const emp = employeeList.find(e => e.empId == selectedEmpId);
            if (!emp) return;

            document.getElementById('editFirstName').value = emp.firstName || "";
            document.getElementById('editLastName').value = emp.lastName || "";
            document.getElementById('editNationalId').value = emp.nationalId || "";

            if (currentAdminRole && currentAdminRole.branchCode === 'SD0000') {
                document.getElementById('ho-only-edit-box').style.display = 'block';
                document.getElementById('editRoleSelect').value = emp.role || "";
                document.getElementById('editBaseSalary').value = emp.baseSalary || "";
            } else {
                document.getElementById('ho-only-edit-box').style.display = 'none';
            }
            showSection('sec-edit-employee');
        }

        async function submitEditEmployee() {
            const firstName = document.getElementById('editFirstName').value;
            const lastName = document.getElementById('editLastName').value;
            const nationalId = document.getElementById('editNationalId').value;
            let newRole = null; let newSalary = null;

            if (currentAdminRole && currentAdminRole.branchCode === 'SD0000') {
                newRole = document.getElementById('editRoleSelect').value;
                newSalary = document.getElementById('editBaseSalary').value;
            }

            if(!firstName || !lastName || !nationalId) return alert("กรุณากรอกข้อมูลพื้นฐานให้ครบ");

            const payload = { action: 'updateEmployee', uid: currentUserUid, empId: selectedEmpId, firstName: firstName, lastName: lastName, nationalId: nationalId, newRole: newRole, newSalary: newSalary };

            showLoading("กำลังบันทึกข้อมูล...");
            try {
                const res = await fetch(GAS_WEB_APP_URL, { method: 'POST', body: JSON.stringify(payload) });
                const result = await res.json();
                if (result.status === 'success') {
                    alert(`✅ สำเร็จ! อัปเดตข้อมูลพนักงานแล้ว`);
                    if(document.getElementById('manager-branch-filter').style.display === 'block'){
                        changeViewBranch(); 
                    } else { loadKioskData(currentUserUid); }
                    showSection('sec-select-user');
                } else { alert(`❌ ผิดพลาด: ${result.message}`); }
            } catch (e) { alert("เชื่อมต่อเซิร์ฟเวอร์ล้มเหลว"); }
            hideLoading();
        }

        // (ซ่อนฟังก์ชันรูปโลโก้ กล้อง และเช็คอินออกงานที่ยาวๆ ไว้ตามเดิมครับ - ทุกอย่างยังทำงานปกติ)
        function handleLogoUpload(event) {
            const file = event.target.files[0]; if (!file) return;
            if (file.size > 2 * 1024 * 1024) { alert("ไฟล์ใหญ่เกินไป (เกิน 2MB)"); event.target.value = ''; return; }
            const reader = new FileReader();
            reader.onload = async function(e) {
                showLoading("กำลังอัปโหลดโลโก้...");
                try {
                    const res = await fetch(GAS_WEB_APP_URL, { method: 'POST', body: JSON.stringify({ action: 'updateLogo', uid: currentUserUid, logoBase64: e.target.result }) });
                    const result = await res.json();
                    if(result.status === 'success') { document.getElementById('companyLogo').src = result.data.logoUrl; alert("เปลี่ยนโลโก้สำเร็จ!"); } 
                    else { alert(result.message); }
                } catch(err) { alert("ผิดพลาด"); }
                hideLoading(); event.target.value = ''; 
            }; reader.readAsDataURL(file);
        }

        async function startIdCamera() {
            document.getElementById('id-card-preview').style.display = 'none'; document.getElementById('btn-retake-id-camera').style.display = 'none'; document.getElementById('btn-start-id-camera').style.display = 'none';
            const video = document.getElementById('id-camera-feed'); document.getElementById('id-camera-container').style.display = 'block'; document.getElementById('btn-capture-id-camera').style.display = 'inline-block';
            try { idVideoStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } }); video.srcObject = idVideoStream; } catch (err) { alert("เปิดกล้องไม่ได้"); }
        }
        function captureIdCard() {
            const video = document.getElementById('id-camera-feed'); const canvas = document.getElementById('id-canvas'); canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0); idCardBase64 = canvas.toDataURL('image/jpeg', 0.6); stopIdCamera();
            const preview = document.getElementById('id-card-preview'); preview.src = idCardBase64; preview.style.display = 'block';
            document.getElementById('btn-retake-id-camera').style.display = 'inline-block'; document.getElementById('btn-start-id-camera').style.display = 'none';
        }
        function stopIdCamera() { if (idVideoStream) { idVideoStream.getTracks().forEach(track => track.stop()); } document.getElementById('id-camera-container').style.display = 'none'; document.getElementById('btn-capture-id-camera').style.display = 'none'; }

        async function submitNewEmployee() {
            const firstName = document.getElementById('newFirstName').value; const lastName = document.getElementById('newLastName').value; const nationalId = document.getElementById('newNationalId').value;
            const role = document.getElementById('newRoleSelect').value; const baseSalary = document.getElementById('newBaseSalary').value; const startDate = document.getElementById('newStartDate').value; const newPin = document.getElementById('newPinCode').value;
            if(!firstName || !lastName || !nationalId || !role || !baseSalary || !startDate) return alert("กรอกข้อมูลให้ครบ"); if(newPin.length !== 4) return alert("PIN ต้อง 4 หลัก"); if(nationalId.length !== 13) return alert("เลขบัตรต้อง 13 หลัก"); if(!idCardBase64) return alert("กรุณาถ่ายบัตรประชาชน");
            
            let targetBranchCode = currentAdminRole.branchCode; let targetBranchName = currentAdminRole.branchName;
            if(currentAdminRole.isManager) { const sel = document.getElementById('newBranchSelect').value; if(!sel) return alert("เลือกสาขา"); targetBranchCode = sel.split("|")[0]; targetBranchName = sel.split("|")[1]; }
            const payload = { action: 'registerEmployee', firstName: firstName, lastName: lastName, nationalId: nationalId, role: role, baseSalary: baseSalary, startDate: startDate, pin: newPin, idCardBase64: idCardBase64, branchCode: targetBranchCode, branchName: targetBranchName };
            showLoading("บันทึกข้อมูล...");
            try {
                const res = await fetch(GAS_WEB_APP_URL, { method: 'POST', body: JSON.stringify(payload) }); const result = await res.json();
                if (result.status === 'success') {
                    alert(`✅ สำเร็จ! ${result.message}`);
                    document.getElementById('newFirstName').value = ""; document.getElementById('newLastName').value = ""; document.getElementById('newNationalId').value = ""; document.getElementById('newRoleSelect').value = ""; document.getElementById('newBaseSalary').value = ""; document.getElementById('newPinCode').value = "";
                    document.getElementById('id-card-preview').style.display = 'none'; idCardBase64 = ""; document.getElementById('btn-start-id-camera').style.display = 'inline-block'; document.getElementById('btn-retake-id-camera').style.display = 'none';
                    if(document.getElementById('manager-branch-filter').style.display === 'block'){ changeViewBranch(); } else { loadKioskData(currentUserUid); } showSection('sec-select-user');
                } else { alert(`❌ ผิดพลาด: ${result.message}`); }
            } catch (error) { alert("เชื่อมต่อล้มเหลว"); }
            hideLoading();
        }

        function showSection(id) { document.querySelectorAll('.section').forEach(sec => sec.classList.remove('active-section')); document.getElementById(id).classList.add('active-section'); }
        function goToPin() { selectedEmpId = document.getElementById('employeeSelect').value; if (!selectedEmpId) return alert("เลือกชื่อพนักงานก่อน"); clearPin(); showSection('sec-pin'); }
        function addPin(num) { if (pinCode.length < 4) { pinCode += num; document.getElementById('pinInput').value = pinCode.replace(/./g, '●'); } }
        function clearPin() { pinCode = ""; document.getElementById('pinInput').value = ""; }
        function verifyPin() {
            if (pinCode.length !== 4) return alert("รหัส PIN ไม่ครบ 4 หลัก");
            const emp = employeeList.find(e => e.empId == selectedEmpId); document.getElementById('greetName').innerText = emp.name; showSection('sec-action'); startCamera();
        }
        async function startCamera() { const video = document.getElementById('camera-feed'); try { videoStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } }); video.srcObject = videoStream; } catch (err) { alert("เปิดกล้องไม่ได้"); } }
        function stopCamera() { if (videoStream) { videoStream.getTracks().forEach(track => track.stop()); } }
        function captureImage() { const video = document.getElementById('camera-feed'); const canvas = document.getElementById('canvas'); canvas.width = video.videoWidth; canvas.height = video.videoHeight; canvas.getContext('2d').drawImage(video, 0, 0); return canvas.toDataURL('image/jpeg', 0.6); }
        async function processRecord(actionType) { showLoading("กำลังค้นหาพิกัด..."); if (navigator.geolocation) { navigator.geolocation.getCurrentPosition(position => sendData(actionType, position.coords.latitude, position.coords.longitude), error => { hideLoading(); alert("เปิด GPS ด้วยครับ"); }, { enableHighAccuracy: true, timeout: 10000 }); } else { alert("ไม่รองรับ GPS"); hideLoading(); } }
        async function sendData(action, lat, lng) {
            showLoading("บันทึกข้อมูล..."); const imageBase64 = captureImage(); const payload = { action: action, branchName: currentBranch, empId: selectedEmpId, pin: pinCode, lat: lat, lng: lng, image: imageBase64 };
            try { const res = await fetch(GAS_WEB_APP_URL, { method: 'POST', body: JSON.stringify(payload) }); const result = await res.json();
                if (result.status === 'success') { alert(`✅ สำเร็จ!\n${result.message}`); stopCamera(); document.getElementById('employeeSelect').value = ""; showSection('sec-select-user'); } else { alert(`❌ ผิดพลาด: ${result.message}`); }
            } catch (error) { alert("ล้มเหลว"); } hideLoading();
        }
        function showLoading(text) { document.getElementById('loading-text').innerText = text; document.getElementById('loading-overlay').style.display = 'flex'; }
        function hideLoading() { document.getElementById('loading-overlay').style.display = 'none'; }
        
        // ==========================================
        // ระบบขอหนังสือรับรองเงินเดือน
        // ==========================================
        let certPinCode = "";

        function goToCertRequest() {
            selectedEmpId = document.getElementById('employeeSelect').value;
            if (!selectedEmpId) return alert("กรุณาเลือกชื่อของคุณก่อนครับ");
            
            const emp = employeeList.find(e => e.empId == selectedEmpId);
            document.getElementById('certEmpName').innerText = emp.name;
            document.getElementById('certEmail').value = "";
            clearCertPin();
            
            showSection('sec-cert-request');
        }

        function addCertPin(num) {
            if (certPinCode.length < 4) {
                certPinCode += num;
                document.getElementById('certPinInput').value = certPinCode.replace(/./g, '●');
            }
        }

        function clearCertPin() {
            certPinCode = "";
            document.getElementById('certPinInput').value = "";
        }

        async function submitCertRequest() {
            const email = document.getElementById('certEmail').value;
            if (!email || !email.includes('@')) return alert("กรุณากรอกอีเมลให้ถูกต้อง");
            if (certPinCode.length !== 4) return alert("กรุณากรอกรหัส PIN ให้ครบ 4 หลัก");

            const payload = {
                action: 'requestCertificate',
                empId: selectedEmpId,
                pin: certPinCode,
                email: email
            };

            showLoading("กำลังสร้างเอกสารและส่งอีเมล...");
            try {
                const res = await fetch(GAS_WEB_APP_URL, {
                    method: 'POST',
                    body: JSON.stringify(payload)
                });
                const result = await res.json();
                
                if (result.status === 'success') {
                    alert(`✅ สำเร็จ! ${result.message}`);
                    showSection('sec-select-user');
                } else {
                    alert(`❌ ผิดพลาด: ${result.message}`);
                }
            } catch (error) {
                alert("เกิดข้อผิดพลาดในการเชื่อมต่อ");
            }
            hideLoading();
        }
    </script>
